<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:fragment="head(title)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title}">MediCare System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-50 min-h-screen">
    <nav th:fragment="navbar" class="bg-indigo-700 text-white shadow-lg">
        <div class="max-w-7xl mx-auto px-4">
            <div class="flex justify-between h-16">
                <div class="flex items-center">
                    <a th:href="@{/}" class="flex-shrink-0 flex items-center">

                        <span class="font-bold text-xl tracking-tight">MediCare Sys</span>
                    </a>
                    <div class="hidden md:ml-10 md:flex md:space-x-8">
                        <a th:href="@{/patients}" class="hover:bg-indigo-600 px-3 py-2 rounded-md text-sm font-medium">Patients</a>
                        <a th:href="@{/praticiens}" class="hover:bg-indigo-600 px-3 py-2 rounded-md text-sm font-medium">Praticiens</a>
                        <a th:href="@{/consultations}" class="hover:bg-indigo-600 px-3 py-2 rounded-md text-sm font-medium">Consultations</a>
                        <a th:href="@{/consultations/stats}" class="hover:bg-indigo-600 px-3 py-2 rounded-md text-sm font-medium">Statistiques</a>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <footer th:fragment="footer" class="bg-white border-t mt-12 py-6">
        <div class="max-w-7xl mx-auto px-4 text-center text-gray-500 text-sm">
            &copy; 2026 MediCare System - Gestion de Clinique Personnalisée
        </div>
    </footer>
</body>
</html>
