<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Liste des Praticiens')}"></head>
<body class="bg-gray-50">
    <nav th:replace="~{fragments/layout :: navbar}"></nav>

    <main class="max-w-7xl mx-auto px-4 py-8">
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-2xl font-bold text-gray-900">Équipe Médicale</h1>
            <a th:href="@{/praticiens/nouveau}" class="bg-green-600 hover:bg-green-700 text-white px-4 py-2 rounded-md text-sm font-medium">
                <i class="fas fa-user-plus mr-2"></i>Nouveau Praticien
            </a>
        </div>

        <div class="grid grid-cols-1 gap-6 sm:grid-cols-2 lg:grid-cols-3">
            <div th:each="p : ${praticiens}" class="bg-white overflow-hidden shadow rounded-lg border-l-4 border-green-500">
                <div class="px-4 py-5 sm:p-6">
                    <div class="flex items-center">
                        <div class="flex-shrink-0 bg-green-100 rounded-full p-3">
                            <i class="fas fa-user-md text-green-600 text-xl"></i>
                        </div>
                        <div class="ml-5 w-0 flex-1">
                            <dl>
                                <dt class="text-sm font-medium text-gray-500 truncate" th:text="${p.specialiteMedicale}"></dt>
                                <dd class="text-lg font-bold text-gray-900" th:text="${p.nomComplet}"></dd>
                            </dl>
                        </div>
                    </div>
                </div>
                <div class="bg-gray-50 px-4 py-4 sm:px-6 flex justify-end space-x-3">
                    <a th:href="@{/praticiens/modifier/{id}(id=${p.id})}" class="text-indigo-600 hover:text-indigo-900 text-sm font-medium">Modifier</a>
                    <a th:href="@{/praticiens/supprimer/{id}(id=${p.id})}" class="text-red-600 hover:text-red-900 text-sm font-medium" onclick="return confirm('Supprimer ce praticien ?')">Supprimer</a>
                </div>
            </div>
        </div>
    </main>

    <footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
