<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Statistiques de la Clinique')}"></head>
<body class="bg-gray-50">
    <nav th:replace="~{fragments/layout :: navbar}"></nav>

    <main class="max-w-7xl mx-auto px-4 py-8">
        <h1 class="text-2xl font-bold text-gray-900 mb-8">Tableau de Bord & Statistiques</h1>

        <!-- No-Show Rate Card -->
        <div class="bg-white shadow rounded-lg p-6 mb-8 border-l-8 border-red-500">
            <div class="flex items-center">
                <div class="p-3 rounded-full bg-red-100 text-red-600 mr-4">
                    <i class="fas fa-user-times text-2xl"></i>
                </div>
                <div>
                    <p class="text-sm font-medium text-gray-500 uppercase tracking-wider">Taux de "No-Show" (Absences)</p>
                    <p class="text-3xl font-bold text-gray-900" th:text="${#numbers.formatDecimal(noShowRate, 1, 2) + '%'}"></p>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            <!-- Stats by Specialite -->
            <div class="bg-white shadow rounded-lg overflow-hidden">
                <div class="bg-indigo-600 px-6 py-4">
                    <h3 class="text-lg font-bold text-white">Consultations par Spécialité</h3>
                </div>
                <div class="p-6">
                    <table class="min-w-full divide-y divide-gray-200">
                        <thead>
                            <tr>
                                <th class="text-left text-xs font-medium text-gray-500 uppercase">Spécialité</th>
                                <th class="text-right text-xs font-medium text-gray-500 uppercase">Nombre</th>
                            </tr>
                        </thead>
                        <tbody class="divide-y divide-gray-200">
                            <tr th:each="entry : ${statsSpecialite}">
                                <td class="py-3 text-sm text-gray-900" th:text="${entry.key}"></td>
                                <td class="py-3 text-sm text-gray-900 text-right font-bold" th:text="${entry.value}"></td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- Stats by Month -->
            <div class="bg-white shadow rounded-lg overflow-hidden">
                <div class="bg-green-600 px-6 py-4">
                    <h3 class="text-lg font-bold text-white">Volume par Mois</h3>
                </div>
                <div class="p-6">
                    <table class="min-w-full divide-y divide-gray-200">
                        <thead>
                            <tr>
                                <th class="text-left text-xs font-medium text-gray-500 uppercase">Mois</th>
                                <th class="text-right text-xs font-medium text-gray-500 uppercase">Nombre</th>
                            </tr>
                        </thead>
                        <tbody class="divide-y divide-gray-200">
                            <tr th:each="entry : ${statsMois}">
                                <td class="py-3 text-sm text-gray-900" th:text="${entry.key}"></td>
                                <td class="py-3 text-sm text-gray-900 text-right font-bold" th:text="${entry.value}"></td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
